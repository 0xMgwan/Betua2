<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Black background -->
  <rect width="200" height="200" fill="#000"/>

  <!-- "2" numeral left -->
  <text x="12" y="155" font-family="Arial Black,sans-serif" font-size="155" font-weight="900" fill="#111" letter-spacing="-5">2</text>

  <!-- "6" numeral right -->
  <text x="105" y="155" font-family="Arial Black,sans-serif" font-size="155" font-weight="900" fill="#111" letter-spacing="-5">6</text>

  <!-- Trophy cup body (gold) -->
  <ellipse cx="100" cy="58" rx="18" ry="6" fill="#C8960C"/>
  <path d="M82 58 Q78 80 82 95 Q88 110 100 115 Q112 110 118 95 Q122 80 118 58Z" fill="url(#gold)"/>
  <!-- Trophy handles -->
  <path d="M82 68 Q68 68 68 80 Q68 90 82 88" stroke="#C8960C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M118 68 Q132 68 132 80 Q132 90 118 88" stroke="#C8960C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Trophy top rim highlight -->
  <ellipse cx="100" cy="58" rx="18" ry="6" stroke="#F0C040" stroke-width="1.5" fill="none"/>
  <!-- Trophy stem -->
  <rect x="96" y="115" width="8" height="14" fill="#B8860B"/>
  <!-- Trophy base -->
  <rect x="82" y="129" width="36" height="8" rx="2" fill="#2E7D32"/>
  <text x="100" y="137" font-family="Arial,sans-serif" font-size="5" font-weight="bold" fill="#F0C040" text-anchor="middle">FIFA WORLD CUP</text>
  <rect x="78" y="137" width="44" height="5" rx="1" fill="#1B5E20"/>

  <!-- FIFA text bottom -->
  <text x="100" y="188" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">FIFA</text>

  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="40%" stop-color="#C8960C"/>
      <stop offset="70%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
</svg>
